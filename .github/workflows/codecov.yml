name: Code Coverage

on:
  push:
    branches:
      - main
      - release-*
    tags:
      - v*
  pull_request:
    branches:
      - main
      - release-*

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Install rnacos
        run: cargo install rnacos

      - name: Start rnacos server
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          export RNACOS_HTTP_PORT=8848
          export RNACOS_GRPC_PORT=9848
          rnacos --version
          nohup rnacos > /tmp/rnacos.log 2>&1 &
          RNACOS_PID=$!
          echo "RNACOS_PID=$RNACOS_PID" >> $GITHUB_ENV
          echo "Waiting for rnacos to be ready..."
          for i in {1..30}; do
            if curl -s http://127.0.0.1:8848 > /dev/null 2>&1; then
              echo "rnacos is ready"
              break
            fi
            sleep 1
          done

      - name: Generate coverage report (with integration tests)
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          cargo tarpaulin --lib --tests --no-fail-fast --out Xml --features "config,naming,auth-by-http" --ignored --skip-clean
        env:
          NACOS_SERVER: external

      - name: Stop rnacos server
        if: always()
        run: |
          if [ -n "$RNACOS_PID" ]; then
            kill $RNACOS_PID 2>/dev/null || true
          fi

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: coverage.xml
          fail_ci_if_error: false
