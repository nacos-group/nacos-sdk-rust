name: Code Coverage

on:
  push:
    branches:
      - main
      - release-*
    tags:
      - v*
  pull_request:
    branches:
      - main
      - release-*

jobs:
  coverage:
    runs-on: ubuntu-latest

    services:
      nacos:
        image: nacos/nacos-server:v2.5.2
        env:
          MODE: standalone
        ports:
          - 8848:8848
          - 9848:9848
        options: >-
          --health-cmd "curl -f http://localhost:8848/nacos/v1/console/health/readiness"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Set sccache env
        run: |
          echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
          echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Wait for Nacos to be ready
        run: |
          echo "Waiting for Nacos to be ready..."
          for i in {1..30}; do
            if curl -s http://localhost:8848/nacos/v1/console/health/readiness > /dev/null 2>&1; then
              echo "Nacos is ready"
              exit 0
            fi
            echo "Attempt $i/30: Nacos not ready yet..."
            sleep 2
          done
          echo "Timeout waiting for Nacos"
          exit 1

      - name: Generate coverage report
        run: |
          cargo tarpaulin --lib --tests --no-fail-fast --out Xml --features "config,naming,auth-by-http" --ignored --skip-clean
        env:
          NACOS_SERVER: external

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Print sccache stats
        if: always()
        run: sccache --show-stats
