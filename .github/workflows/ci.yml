name: CI

on:
  push:
    branches:
      - main
      - release-*
    tags:
      - v*
  pull_request:
    branches:
      - main
      - release-*

env:
  CARGO_TERM_COLOR: always
  CARGO_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: cargo fmt
        run: cargo fmt --all -- --check --color ${{ env.CARGO_TERM_COLOR }}
      - name: cargo clippy
        run: cargo clippy --all-features -- -W warnings

  integration-rnacos:
    name: Integration Tests (rnacos)
    runs-on: ubuntu-latest
    needs: [lint, build]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - name: Install and test with rnacos
        run: |
          cargo install rnacos
          export PATH="$HOME/.cargo/bin:$PATH"
          rnacos --version
          cargo test --test it_config --test it_naming --test it_auth --features "config,naming,auth-by-http" -- --include-ignored --test-threads=1

  integration-docker:
    name: Integration Tests (Docker Nacos v2.5.2)
    runs-on: ubuntu-latest
    needs: [lint, build]
    services:
      nacos:
        image: nacos/nacos-server:v2.5.2
        env:
          MODE: standalone
        ports:
          - 8848:8848
          - 9848:9848
        options: >-
          --health-cmd "curl -f http://localhost:8848/nacos/v1/console/health/readiness"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - name: Wait for Nacos
        run: sleep 30 && curl -s http://localhost:8848/nacos/v1/console/health/readiness || true
      - name: Run integration tests
        run: |
          cargo test --test it_config --test it_naming --test it_auth --features "config,naming,auth-by-http" -- --include-ignored --test-threads=1
        env:
          NACOS_SERVER: external

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Build
        run: cargo build
      - name: Build examples
        run: cargo build --examples
      - name: Run Tests
        run: cargo test --lib --bins --all-features

  feature-matrix:
    name: Feature Matrix
    runs-on: ubuntu-latest
    strategy:
      matrix:
        features:
          - "config"
          - "naming"
          - "config,naming"
          - "config,naming,tls"
          - "config,naming,auth-by-http"
          - "config,naming,auth-by-http,tls"
          - "config,naming,auth-by-aliyun"
    steps:
      - uses: actions/checkout@v3
      - name: Build with features
        run: cargo build --features "${{ matrix.features }}"
      - name: Test with features
        run: cargo test --lib --bins --features "${{ matrix.features }}"
